name: Test basic npm audit
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          working_directory: ${{ github.workspace }}/actions/hardened/oke-py--npm-audit-action/v4.0.1/tests/fixtures/sample-project
          audit_level: critical
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
      - name: Assert npm_audit output is present
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          echo "PASS"
