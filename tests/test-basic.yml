name: Test basic usage - no vulnerabilities
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a clean npm project with no vulnerabilities
        run: |
          mkdir -p "$GITHUB_WORKSPACE/clean-project"
          cat > "$GITHUB_WORKSPACE/clean-project/package.json" <<'EOF'
          {
            "name": "clean-project",
            "version": "1.0.0",
            "description": "A clean project with no dependencies",
            "dependencies": {}
          }
          EOF
          cd "$GITHUB_WORKSPACE/clean-project"
          npm install --package-lock-only

      - id: action
        uses: .
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          audit_level: low
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
          working_directory: clean-project

      - name: Assert npm_audit output is set
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          echo "PASS: npm_audit output is set"
