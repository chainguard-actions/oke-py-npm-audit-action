name: Test npm audit with JSON flag
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up clean npm project fixture
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures/json-project"
          cd "$GITHUB_WORKSPACE/tests/fixtures/json-project"
          cat > package.json <<'EOF'
          {
            "name": "json-project",
            "version": "1.0.0",
            "description": "A clean project for JSON flag test",
            "dependencies": {}
          }
          EOF
          npm install --package-lock-only

      - id: action
        uses: .
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: tests/fixtures/json-project
          audit_level: low
          json_flag: 'true'
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'

      - name: Assert npm_audit output is valid JSON
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          # JSON output should contain audit-related keys
          if ! echo "$ACTUAL" | grep -q '"vulnerabilities"'; then
            echo "FAIL: expected JSON output to contain 'vulnerabilities' key"
            exit 1
          fi
          echo "PASS: npm_audit output contains valid JSON with vulnerabilities key"
