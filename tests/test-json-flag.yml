name: Test json_flag option
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          github_token: fake-token-for-json-test
          audit_level: low
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
          json_flag: 'true'
          working_directory: tests/fixtures/clean-package

      - name: Assert npm_audit output is valid JSON
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          # Verify the output contains JSON (should have curly braces)
          if echo "$ACTUAL" | grep -q '{'; then
            echo "PASS: npm_audit output contains JSON"
          else
            echo "FAIL: expected JSON output but got: $ACTUAL"
            exit 1
          fi
