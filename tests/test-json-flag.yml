name: Test json_flag - npm audit with --json output
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a clean npm project with no vulnerabilities
        run: |
          mkdir -p "$GITHUB_WORKSPACE/json-project"
          cat > "$GITHUB_WORKSPACE/json-project/package.json" <<'EOF'
          {
            "name": "json-project",
            "version": "1.0.0",
            "description": "A clean project for JSON output test",
            "dependencies": {}
          }
          EOF
          cd "$GITHUB_WORKSPACE/json-project"
          npm install --package-lock-only

      - id: action
        uses: .
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          audit_level: low
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
          json_flag: 'true'
          working_directory: json-project

      - name: Assert npm_audit output is valid JSON
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          # Verify the output is valid JSON by parsing it
          if echo "$ACTUAL" | python3 -c "import sys, json; json.load(sys.stdin)" 2>/dev/null; then
            echo "PASS: npm_audit output is valid JSON"
          else
            echo "FAIL: npm_audit output is not valid JSON"
            exit 1
          fi
