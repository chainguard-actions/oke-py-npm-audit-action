name: Test json_flag enabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          audit_level: low
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'true'
          json_flag: 'true'
          github_token: ${{ github.token }}
          working_directory: tests/fixtures/clean-project
        env:
          GITHUB_EVENT_NAME: push
          GITHUB_REF: refs/heads/main

      - name: Assert npm_audit output is valid JSON
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          if echo "$ACTUAL" | python3 -c "import sys, json; json.load(sys.stdin)" 2>/dev/null; then
            echo "PASS: npm_audit output is valid JSON"
          else
            echo "FAIL: npm_audit output is not valid JSON"
            exit 1
          fi
