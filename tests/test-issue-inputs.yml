name: Test issue_assignees, issue_labels, issue_type, and registry inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up clean npm project fixture
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures/clean-project"
          cd "$GITHUB_WORKSPACE/tests/fixtures/clean-project"
          cat > package.json <<'EOF'
          {
            "name": "clean-project",
            "version": "1.0.0",
            "description": "A clean project with no vulnerabilities",
            "dependencies": {}
          }
          EOF
          npm install --package-lock-only

      - id: action
        uses: .
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: tests/fixtures/clean-project
          audit_level: low
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
          issue_assignees: 'octocat'
          issue_labels: 'security,vulnerability'
          issue_type: 'Bug'
          registry: 'https://registry.npmjs.org'

      - name: Assert npm_audit output is set
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          echo "PASS: npm_audit output is set with issue_assignees, issue_labels, issue_type, and registry inputs"
