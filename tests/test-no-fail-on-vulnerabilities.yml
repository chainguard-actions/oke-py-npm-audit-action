name: Test fail_on_vulnerabilities false
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up clean npm project in workspace subdirectory
        run: |
          mkdir -p nofail-project
          cp tests/fixtures/clean-project/package.json nofail-project/
          cp tests/fixtures/clean-project/package-lock.json nofail-project/

      - id: action
        uses: .
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          audit_level: low
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
          working_directory: nofail-project

      - name: Assert action succeeded and npm_audit output is set
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          echo "PASS: action succeeded with fail_on_vulnerabilities=false"
