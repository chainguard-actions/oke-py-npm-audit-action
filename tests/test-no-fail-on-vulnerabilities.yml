name: Test fail_on_vulnerabilities disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          audit_level: critical
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
          github_token: ${{ github.token }}
          working_directory: tests/fixtures/clean-project
        env:
          GITHUB_EVENT_NAME: push
          GITHUB_REF: refs/heads/main

      - name: Assert action succeeded and npm_audit output is set
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          echo "PASS: action completed without failure and npm_audit output is set"
