name: Test registry input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy clean npm project to workspace
        run: |
          cp "$GITHUB_WORKSPACE/hardened/tests/fixtures/clean-project/package.json" "$GITHUB_WORKSPACE/package.json"
          cp "$GITHUB_WORKSPACE/hardened/tests/fixtures/clean-project/package-lock.json" "$GITHUB_WORKSPACE/package-lock.json"

      - id: audit
        uses: .
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          audit_level: low
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
          registry: 'https://registry.npmjs.org'

      - name: Assert npm_audit output is set
        env:
          ACTUAL: ${{ steps.audit.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          echo "PASS: npm_audit output is set when using registry"
