name: Test report_format=markdown input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: audit
        uses: .
        with:
          github_token: ${{ github.token }}
          fail_on_vulnerabilities: 'false'
          create_issues: 'false'
          create_pr_comments: 'false'
          report_format: markdown
          working_directory: tests/fixtures/clean-project
        env:
          GITHUB_EVENT_NAME: push

      - name: Assert npm_audit output is set with markdown report_format
        env:
          ACTUAL: ${{ steps.audit.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty when report_format=markdown"
            exit 1
          fi
          echo "PASS: npm_audit output is set with report_format=markdown"
