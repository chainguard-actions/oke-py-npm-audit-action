name: Test npm audit with working_directory
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up fixture package.json
        run: |
          cd $GITHUB_WORKSPACE/actions/hardened/oke-py--npm-audit-action/v3.0.0/tests/fixtures/project
          npm install --package-lock-only

      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          working_directory: ${{ github.workspace }}/actions/hardened/oke-py--npm-audit-action/v3.0.0/tests/fixtures/project
          create_issues: 'false'
          create_pr_comments: 'false'
          audit_level: low
          production_flag: 'false'
          json_flag: 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Assert npm_audit output exists
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty"
            exit 1
          fi
          echo "PASS"
