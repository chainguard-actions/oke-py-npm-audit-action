name: Test working_directory input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          github_token: ${{ github.token }}
          audit_level: low
          create_issues: 'false'
          create_pr_comments: 'false'
          fail_on_vulnerabilities: 'false'
          working_directory: tests/fixtures/clean-project

      - name: Assert npm_audit output is set when using working_directory
        env:
          ACTUAL: ${{ steps.action.outputs.npm_audit }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected npm_audit output to be non-empty when using working_directory"
            exit 1
          fi
          echo "PASS: npm_audit output is set when using working_directory"
